name: Branch and Commit Validation

on:
  pull_request:
    branches:
      - main

jobs:
  validate-pr:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch name
        run: |
          BRANCH="${{ github.head_ref }}"

          echo "Branch: $BRANCH"

          # Expresión regular que solo exige el prefijo y cualquier descripción posterior
          if [[ ! "$BRANCH" =~ ^(feature|bugfix|hotfix|release|chore)/.+$ ]]; then
            echo "❌ Branch name must start with a valid prefix followed by a description."
            echo "Example: feature/add-event-catalog-card"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install --save-dev @commitlint/cli @commitlint/config-conventional

      - run: npx commitlint \
          --from ${{ github.event.pull_request.base.sha }} \
          --to ${{ github.event.pull_request.head.sha }}
