name: Frontend Quality

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-quality-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  angular-quality:
    name: Angular lint, tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gftickets-angular

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Angular dependencies
        run: npm ci

      - name: Run Angular static analysis
        run: npm run lint

      - name: Run Angular tests
        run: npm test -- --watch=false

      - name: Build Angular application
        run: npm run build

  react-quality:
    name: React lint, tests and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gftickets-react

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install React dependencies
        run: npm ci

      - name: Run React static analysis
        run: npm run lint

      - name: Run React tests
        run: npm test -- --run

      - name: Build React application
        run: npm run build